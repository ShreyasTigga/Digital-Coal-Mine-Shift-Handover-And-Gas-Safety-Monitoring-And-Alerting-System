<!DOCTYPE html>
<html>
<head>

    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/admin.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Coal Mine</h2>

        <ul>
            <li onclick="go('/admin')">Dashboard</li>
            <li>Users</li>
            <li>Reports</li>
            <li>Gas Alerts</li>
            <li>Incidents</li>
        </ul>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Navbar -->
        <div class="navbar">
            <h2>Admin Dashboard</h2>
            <span>Welcome, Admin</span>
        </div>

        <!-- Cards -->
        <div class="cards">

            <div class="card">
                <h3>Total Workers</h3>
                <p id="workers">0</p>
            </div>

            <div class="card">
                <h3>Shift Reports</h3>
                <p id="reports">0</p>
            </div>

            <div class="card">
                <h3>Gas Alerts</h3>
                <p id="alerts">0</p>
            </div>

        </div>

        <!-- Table -->
        <div class="table">
            <h3>Recent Shift Reports</h3>

            <table>
                <thead>
                <tr>
                    <th>Section</th>
                    <th>Shift</th>
                    <th>Supervisor</th>
                </tr>
                </thead>

                <tbody id="reportTable"></tbody>
            </table>
        </div>

    </div>

</div>

<script src="/js/dashboard.js"></script>

</body>
</html>
